<!DOCTYPE html>

    <style>

<body>

<div id="app-wrapper"></div>

<script>
(function() {
    'use strict';
    
    // ==================== KONFIGURASI ====================
    const CONFIG = {
        OEE_TARGET: 88,
        OEE365_TARGET: 55,
        A_TARGET: 93,
        P_TARGET: 98,
        Q_TARGET: 99,
        A365_TARGET: 60,
        MANAGEMENT_PASSWORD: 'admin123'
    };
    
    const KODE_TKL = {
        '1': { name: 'PERSIAPAN AWAL (SETUP)', icon: '🔧', hasDuration: true },
        '2': { name: 'JALAN PROSES (RUNNING)', icon: '⚙️', hasDuration: false },
        '3': { name: 'LINESTOP MESIN', icon: '⚠️', hasDuration: false },
        '5': { name: 'AM ACTIVITY', icon: '🧹', hasDuration: true },
        '6': { name: 'PM, CLOSE TAG', icon: '🔩', hasDuration: false },
        '7': { name: 'CLEANING AKHIR', icon: '🧼', hasDuration: true },
        '8': { name: 'ISTIRAHAT, BRIEFING', icon: '☕', hasDuration: true },
        '9': { name: 'LINE STOP NON MESIN', icon: '⏸️', hasDuration: false }
    };
    
    const SHIFTS = {
        'SHIFT 1 (07:00-15:30)': { start: '07:00', end: '15:30', minutes: 510 },
        'SHIFT 2 (15:20-22:50)': { start: '15:20', end: '22:50', minutes: 450 },
        'SHIFT 3 (22:40-07:10)': { start: '22:40', end: '07:10', minutes: 530 },
        'LONGSHIFT PAGI (07:00-19:00)': { start: '07:00', end: '19:00', minutes: 720 },
        'LONGSHIFT MALAM (19:00-07:00)': { start: '19:00', end: '07:00', minutes: 720 }
    };
    
    // ==================== LOCAL STORAGE ====================
    const STORAGE_KEYS = {
        MACHINES: 'oee_machines_final',
        LIBRARY: 'oee_library_final',
        OEE_RECORDS: 'oee_records_final'
    };
    
    // ==================== STATE ====================
    let currentPage = 'dashboard';
    let allMachines = [];
    let allOEERecords = [];
    let libraryKegiatan = {};
    let chartInstances = {};
    let isManagementUnlocked = false;
    
    // State untuk Input TKL
    let kegiatanList = [];
    let batches = [];
    let selectedDate = new Date().toISOString().split('T')[0];
    let selectedShift = '';
    let selectedMachineId = '';
    let selectedOperator = '';
    let editMode = false;
    let editingRecordId = null;
    
    let filters = {
        startDate: getCurrentMonthStart(),
        endDate: getCurrentMonthEnd(),
        shift: 'all',
        machine: 'all',
        pic: 'all'
    };
    
    // ==================== HELPER FUNCTIONS ====================
    function getCurrentMonthStart() {
        const date = new Date();
        date.setDate(1);
        return date.toISOString().split('T')[0];
    }
    
    function getCurrentMonthEnd() {
        const date = new Date();
        date.setMonth(date.getMonth() + 1);
        date.setDate(0);
        return date.toISOString().split('T')[0];
    }
    
    function formatDate(dateStr) {
        if (!dateStr) return '-';
        try {
            return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        } catch { return dateStr; }
    }
    
    function formatDateShort(dateStr) {
        if (!dateStr) return '-';
        try {
            return new Date(dateStr).toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit' });
        } catch { return dateStr; }
    }
    
    function toUpper(str) { return str ? str.toString().toUpperCase() : ''; }
    
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = type === 'success' ? '#10b981' : '#ef4444';
        toast.innerHTML = `${type === 'success' ? '✅' : '❌'} ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function showModal(content) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-content">${content}</div>`;
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        document.body.appendChild(modal);
    }
    
    function closeModal() { document.querySelector('.modal-overlay')?.remove(); }
    
    function getShiftMinutes(shiftKey) { return SHIFTS[shiftKey]?.minutes || 480; }
    function getShiftStart() { return selectedShift ? SHIFTS[selectedShift]?.start || '07:00' : '07:00'; }
    function getShiftEnd() { return selectedShift ? SHIFTS[selectedShift]?.end || '15:30' : '15:30'; }
    function getNextStart() { return kegiatanList.length === 0 ? getShiftStart() : kegiatanList[kegiatanList.length - 1].jam; }
    function addHour(time) { if (!time) return '08:00'; const [h, m] = time.split(':').map(Number); const nh = (h + 1) % 24; return `${nh.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`; }
    function isTimeGreater(t1, t2) { if (!t1 || !t2) return false; const [h1,m1] = t1.split(':').map(Number); const [h2,m2] = t2.split(':').map(Number); return h1 > h2 || (h1 === h2 && m1 > m2); }
    function hitungDurasi(dari, sampai) { if (!dari || !sampai) return 0; const [h1,m1] = dari.split(':').map(Number); const [h2,m2] = sampai.split(':').map(Number); return (h2*60+m2) - (h1*60+m1); }
    
    // ==================== PERHITUNGAN ====================
    function hitungResume(kegiatanList, machineId) {
        let totalODT = 0, totalRunning = 0, totalLineStopMesin = 0, totalLineStopNonMesin = 0, odtExceeds = [];
        const mesin = allMachines.find(m => m.id === machineId);
        
        kegiatanList.forEach(k => {
            const dur = hitungDurasi(k.dari, k.jam);
            if (k.kode === 2) totalRunning += dur;
            else if (k.kode === 3) totalLineStopMesin += dur;
            else if (k.kode === 9) totalLineStopNonMesin += dur;
            else if ([1,5,6,7,8].includes(k.kode)) {
                let standarDurasi = 0;
                if (mesin?.activities && mesin.activities[k.kode]) {
                    const kegiatan = mesin.activities[k.kode].find(a => a.nama === k.kegiatan);
                    standarDurasi = kegiatan?.durasi || 0;
                }
                if (standarDurasi > 0 && dur > standarDurasi) {
                    totalODT += standarDurasi;
                    const exceed = dur - standarDurasi;
                    totalLineStopNonMesin += exceed;
                    odtExceeds.push({ item: k.kegiatan, standardTime: standarDurasi, actualTime: dur, exceed: exceed });
                } else {
                    totalODT += dur;
                }
            }
        });
        return { totalODT, totalRunning, totalLineStopMesin, totalLineStopNonMesin, odtExceeds };
    }
    
    function hitungAvailAndOEE(kegiatanList, batches, selectedShift, machineId) {
        const resume = hitungResume(kegiatanList, machineId);
        const jamKerja = getShiftMinutes(selectedShift);
        const totalGood = batches.reduce((s, b) => s + (b.good || 0), 0);
        const totalReject = batches.reduce((s, b) => s + (b.reject || 0), 0);
        const mesin = allMachines.find(m => m.id === machineId);
        const target = mesin?.target_per_minute || 1;
        
        const perf = (resume.totalRunning * target) > 0 ? (totalGood / (resume.totalRunning * target)) * 100 : 0;
        const quality = totalGood > 0 ? ((totalGood - totalReject) / totalGood) * 100 : 100;
        const denominatorAvail = jamKerja - resume.totalODT;
        const avail = denominatorAvail > 0 ? (resume.totalRunning / denominatorAvail) * 100 : 0;
        const avail365 = jamKerja > 0 ? (resume.totalRunning / jamKerja) * 100 : 0;
        const oeeValue = (avail * perf * quality) / 10000;
        const oee365 = (avail365 * perf * quality) / 10000;
        const sisaJamKerja = jamKerja - resume.totalODT - resume.totalLineStopMesin - resume.totalLineStopNonMesin - resume.totalRunning;
        
        return { avail, avail365, perf, quality, oee: oeeValue, oee365, sisaJamKerja, totalGood, totalReject, odtExceeds: resume.odtExceeds };
    }
    
    // ==================== LOAD DATA ====================
    function loadFromStorage() {
        const storedMachines = localStorage.getItem(STORAGE_KEYS.MACHINES);
        if (storedMachines) {
            allMachines = JSON.parse(storedMachines);
        } else {
            allMachines = [
                { id: '1', machine_name: 'INJEKSI 1', target_per_minute: 2.5, pic: 'BUDI', minor_stop: ['ETIKET PUTUS', 'CODING KERING'], activities: {} },
                { id: '2', machine_name: 'INJEKSI 2', target_per_minute: 2.3, pic: 'ANDRE', minor_stop: ['ETIKET PUTUS', 'AIR PRESSURE LOW'], activities: {} },
                { id: '3', machine_name: 'ASSY LINE A', target_per_minute: 1.8, pic: 'SUSAN', minor_stop: ['BELT SLIP'], activities: {} }
            ];
            saveToStorage();
        }
        
        const storedLibrary = localStorage.getItem(STORAGE_KEYS.LIBRARY);
        if (storedLibrary) {
            libraryKegiatan = JSON.parse(storedLibrary);
        } else {
            libraryKegiatan = {
                '1': ['SETUP MESIN', 'PERSIAPAN MATERIAL', 'PENGECEKAN AWAL'],
                '2': ['PRODUKSI NORMAL'],
                '3': ['MOTOR OVERLOAD', 'SENSOR ERROR', 'BELT PUTUS'],
                '5': ['5R PAGI', 'CLEANING MESIN'],
                '6': ['PM HARIAN', 'PM MINGGUAN'],
                '7': ['CLEANING AKHIR', 'PEMBERSIHAN AREA'],
                '8': ['ISTIRAHAT', 'BRIEFING', 'START UP'],
                '9': ['TUNGGU MATERIAL', 'TUNGGU INSTRUKSI', 'ADMINISTRASI']
            };
            saveToStorage();
        }
        
        const storedRecords = localStorage.getItem(STORAGE_KEYS.OEE_RECORDS);
        if (storedRecords) {
            allOEERecords = JSON.parse(storedRecords);
        } else {
            allOEERecords = [];
            for (let i = 0; i < 15; i++) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                allOEERecords.push({
                    id: Date.now() + i,
                    date: date.toISOString().split('T')[0],
                    shift: Object.keys(SHIFTS)[Math.floor(Math.random() * 5)],
                    machine_name: allMachines[Math.floor(Math.random() * allMachines.length)].machine_name,
                    pic: ['BUDI', 'ANDRE', 'SUSAN'][Math.floor(Math.random() * 3)],
                    batch_number: `BATCH-${Math.floor(Math.random() * 1000)}`,
                    actual_output: Math.floor(800 + Math.random() * 1200),
                    reject: Math.floor(Math.random() * 50),
                    availability_actual: 75 + Math.random() * 24,
                    availability_365: 50 + Math.random() * 40,
                    performance: 88 + Math.random() * 11,
                    quality: 95 + Math.random() * 4.5,
                    oee_actual: (75 + Math.random() * 24) * (88 + Math.random() * 11) * (95 + Math.random() * 4.5) / 10000,
                    oee_365: (50 + Math.random() * 40) * (88 + Math.random() * 11) * (95 + Math.random() * 4.5) / 10000,
                    notes: i % 7 === 0 ? 'Sample data' : ''
                });
            }
            saveToStorage();
        }
    }
    
    function saveToStorage() {
        localStorage.setItem(STORAGE_KEYS.MACHINES, JSON.stringify(allMachines));
        localStorage.setItem(STORAGE_KEYS.LIBRARY, JSON.stringify(libraryKegiatan));
        localStorage.setItem(STORAGE_KEYS.OEE_RECORDS, JSON.stringify(allOEERecords));
    }
    
    function saveOEERecord(recordData) {
        const newRecord = { ...recordData, id: Date.now().toString(), created_at: new Date().toISOString() };
        allOEERecords.unshift(newRecord);
        saveToStorage();
        showToast('Data OEE berhasil disimpan!');
        return newRecord;
    }
    
    function updateOEERecord(recordId, recordData) {
        const index = allOEERecords.findIndex(r => r.id === recordId);
        if (index !== -1) {
            allOEERecords[index] = { ...recordData, id: recordId, updated_at: new Date().toISOString() };
            saveToStorage();
            showToast('Data berhasil diupdate!');
            return true;
        }
        return false;
    }
    
    function getFilteredRecords() {
        return allOEERecords.filter(r => {
            if (!r.date) return false;
            const rDate = new Date(r.date);
            const sDate = new Date(filters.startDate);
            const eDate = new Date(filters.endDate);
            eDate.setHours(23, 59, 59);
            if (!(rDate >= sDate && rDate <= eDate)) return false;
            if (filters.shift !== 'all' && r.shift !== filters.shift) return false;
            if (filters.machine !== 'all' && r.machine_name !== filters.machine) return false;
            if (filters.pic !== 'all' && r.pic !== filters.pic) return false;
            return true;
        });
    }
    
    function calculateMetrics(records) {
        if (!records.length) return { avgOEEActual: 0, avgOEE365: 0, totalOutput: 0 };
        const avgOEEActual = records.reduce((s, r) => s + (r.oee_actual || 0), 0) / records.length;
        const avgOEE365 = records.reduce((s, r) => s + (r.oee_365 || 0), 0) / records.length;
        const totalOutput = records.reduce((s, r) => s + (r.actual_output || 0), 0);
        return { avgOEEActual, avgOEE365, totalOutput };
    }
    
    // ==================== CHART FUNCTIONS ====================
    function getMonthlyTrendData(records) {
        const currentYear = new Date().getFullYear();
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
        const monthlyData = Array(12).fill().map(() => []);
        records.forEach(r => {
            if (!r.date) return;
            const recordYear = new Date(r.date).getFullYear();
            if (recordYear !== currentYear) return;
            const month = new Date(r.date).getMonth();
            monthlyData[month].push(r.oee_actual || 0);
        });
        const monthlyAvg = monthlyData.map(arr => arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : null);
        return { months: monthNames, values: monthlyAvg };
    }
    
    function getPerMachineData(records) {
        const machineStats = {};
        records.forEach(r => {
            if (!r.machine_name) return;
            if (!machineStats[r.machine_name]) machineStats[r.machine_name] = { total: 0, count: 0 };
            machineStats[r.machine_name].total += r.oee_actual || 0;
            machineStats[r.machine_name].count += 1;
        });
        return Object.entries(machineStats).map(([name, stats]) => ({ name, avg: stats.total / stats.count })).sort((a, b) => b.avg - a.avg);
    }
    
    function getAPQData(records) {
        const avgA = records.length ? records.reduce((s, r) => s + (r.availability_actual || 0), 0) / records.length : 0;
        const avgP = records.length ? records.reduce((s, r) => s + (r.performance || 0), 0) / records.length : 0;
        const avgQ = records.length ? records.reduce((s, r) => s + (r.quality || 0), 0) / records.length : 0;
        const avgA365 = records.length ? records.reduce((s, r) => s + (r.availability_365 || 0), 0) / records.length : 0;
        return { avgA, avgP, avgQ, avgA365 };
    }
    
    function getOperatorPerformance(records) {
        const picStats = {};
        records.forEach(r => {
            if (!r.pic) return;
            if (!picStats[r.pic]) picStats[r.pic] = { totalOEE: 0, totalOutput: 0, count: 0 };
            picStats[r.pic].totalOEE += r.oee_actual || 0;
            picStats[r.pic].totalOutput += r.actual_output || 0;
            picStats[r.pic].count += 1;
        });
        return Object.entries(picStats).map(([pic, stats]) => ({ pic, avgOEE: stats.totalOEE / stats.count, totalOutput: stats.totalOutput, count: stats.count })).sort((a, b) => b.avgOEE - a.avgOEE).slice(0, 10);
    }

        Object.values(chartInstances).forEach(chart => { if (chart && chart.destroy) chart.destroy(); });

    // ==================== SHOW RECORD DETAIL ====================
    function showRecordDetail(record) {
        let odtItemsHTML = '';
        let totalODT = 0;
        if (record.odt_data && record.odt_data.length) {
            record.odt_data.forEach(odt => {
                if (odt.checked) {
                    const actual = parseFloat(odt.actualTime) || 0;
                    const standard = parseFloat(odt.standardTime) || 0;
                    const used = Math.min(actual, standard);
                    totalODT += used;
                    const exceed = actual > standard ? actual - standard : 0;
                    odtItemsHTML += `<div class="detail-item"><div class="detail-item-label">${odt.name}</div><div class="detail-item-value">${used.toFixed(1)} menit (Standar: ${standard} menit)</div>${exceed > 0 ? `<div style="color: #f59e0b; font-size: 12px; margin-top: 4px;">⚠️ Exceed: +${exceed.toFixed(1)} menit</div>` : ''}</div>`;
                }
            });
        }
        
        let totalLSM = 0;
        let lsmItemsHTML = '';
        if (record.line_stop_mesin_data && record.line_stop_mesin_data.length) {
            record.line_stop_mesin_data.forEach(ls => {
                const dur = parseFloat(ls.duration) || 0;
                totalLSM += dur;
                lsmItemsHTML += `<div class="detail-item"><div class="detail-item-label">${ls.item}</div><div class="detail-item-value">${dur.toFixed(1)} menit</div></div>`;
            });
        }
        
        let totalLSNM = 0;
        let lsnmItemsHTML = '';
        if (record.line_stop_non_mesin_data && record.line_stop_non_mesin_data.length) {
            record.line_stop_non_mesin_data.forEach(ls => {
                const dur = parseFloat(ls.duration) || 0;
                totalLSNM += dur;
                lsnmItemsHTML += `<div class="detail-item"><div class="detail-item-label">${ls.item}</div><div class="detail-item-value">${dur.toFixed(1)} menit</div></div>`;
            });
        }
        
        let msItemsHTML = '';
        if (record.minor_stop_data && record.minor_stop_data.length) {
            record.minor_stop_data.forEach(ms => {
                msItemsHTML += `<div class="detail-item"><div class="detail-item-label">${ms.item}</div><div class="detail-item-value">${ms.frequency} kali</div></div>`;
            });
        }
        
        const modalContent = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-size: 24px; font-weight: 700; color: #667eea;">📋 Detail OEE Record</h3>
                <button class="btn btn-secondary" onclick="closeModal()" style="padding: 8px 16px;">✕ Tutup</button>
            </div>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px;">
                <div class="detail-item"><div class="detail-item-label">Tanggal</div><div class="detail-item-value">${formatDate(record.date)}</div></div>
                <div class="detail-item"><div class="detail-item-label">Shift</div><div class="detail-item-value">${record.shift || '-'}</div></div>
                <div class="detail-item"><div class="detail-item-label">Mesin</div><div class="detail-item-value">${record.machine_name || '-'}</div></div>
                <div class="detail-item"><div class="detail-item-label">Operator</div><div class="detail-item-value">${record.pic || '-'}</div></div>
                <div class="detail-item"><div class="detail-item-label">Batch</div><div class="detail-item-value">${record.batch_number || '-'}</div></div>
                <div class="detail-item"><div class="detail-item-label">Output / Reject</div><div class="detail-item-value">${record.actual_output || 0} / ${record.reject || 0}</div></div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;">
                <div class="detail-item"><div class="detail-item-label">Availability</div><div class="detail-item-value">${(record.availability_actual || 0).toFixed(1)}%</div></div>
                <div class="detail-item"><div class="detail-item-label">Performance</div><div class="detail-item-value">${(record.performance || 0).toFixed(1)}%</div></div>
                <div class="detail-item"><div class="detail-item-label">Quality</div><div class="detail-item-value">${(record.quality || 0).toFixed(1)}%</div></div>
                <div class="detail-item"><div class="detail-item-label">OEE Actual</div><div class="detail-item-value ${(record.oee_actual || 0) >= CONFIG.OEE_TARGET ? 'badge-success' : 'badge-danger'}">${(record.oee_actual || 0).toFixed(1)}%</div></div>
                <div class="detail-item"><div class="detail-item-label">OEE 365</div><div class="detail-item-value">${(record.oee_365 || 0).toFixed(1)}%</div></div>
                <div class="detail-item"><div class="detail-item-label">Minor Stop</div><div class="detail-item-value">${record.minor_stop_count || 0} kali</div></div>

            ${odtItemsHTML ? `<div style="margin-bottom: 24px;"><div style="font-size: 16px; font-weight: 700; margin-bottom: 12px;">⏱️ ODT - Total: ${totalODT.toFixed(1)} menit</div>${odtItemsHTML}</div>` : ''}

    // ==================== EDIT MESIN ACTIVITIES ====================
    function editMachineActivities(machineId) {
        const machine = allMachines.find(m => m.id === machineId);
        if (!machine) return;
        
        let html = `<h3 class="text-xl font-bold mb-4">📋 ATUR KEGIATAN MESIN: ${machine.machine_name}</h3>`;
        html += `<p class="text-sm text-gray-500 mb-4">Pilih kegiatan dari library untuk mesin ini. Centang yang tersedia. Untuk kegiatan ODT (Kode 1,5,7,8), isi durasi standar.</p>`;
        
        const kodeUrutan = ['1','2','3','5','6','7','8','9'];
        
        kodeUrutan.forEach(kode => {
            const libraryItems = libraryKegiatan[kode] || [];
            const currentActivities = machine.activities?.[kode] || [];
            const currentNames = currentActivities.map(a => a.nama);
            
            html += `<div class="border rounded-lg p-3 mb-3 bg-gray-50">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="kode-badge kode-${kode}">KODE ${kode}</span>
                            <span class="font-semibold">${KODE_TKL[kode]?.icon} ${KODE_TKL[kode]?.name}</span>
                            ${KODE_TKL[kode]?.hasDuration ? '<span class="text-xs text-blue-500 ml-2">(Bisa diisi durasi standar)</span>' : ''}
                        </div>
                        <div class="space-y-2">`;
            
            if (libraryItems.length === 0) {
                html += `<div class="text-center text-gray-400 text-sm py-2">Belum ada kegiatan di library untuk kode ${kode}</div>`;
            } else {
                libraryItems.forEach(item => {
                    const currentActivity = currentActivities.find(a => a.nama === item);
                    const currentDurasi = currentActivity?.durasi || '';
                    html += `<div class="flex items-center gap-3 p-2 bg-white rounded-lg">
                                <input type="checkbox" class="act-checkbox" data-kode="${kode}" data-nama="${item}" ${currentNames.includes(item) ? 'checked' : ''}>
                                <span class="text-sm flex-1">${item}</span>
                                ${KODE_TKL[kode]?.hasDuration ? `
                                    <div class="flex items-center gap-1">
                                        <span class="text-xs text-gray-500">Durasi standar:</span>
                                        <input type="number" class="duration-input" data-nama="${item}" data-kode="${kode}" value="${currentDurasi}" placeholder="menit" style="width: 80px; padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 8px;">
                                        <span class="text-xs text-gray-500">menit</span>
                                    </div>
                                ` : ''}
                            </div>`;
                });
            }
            
            html += `</div></div>`;
        });
        
        html += `<div class="flex gap-3 mt-4"><button class="btn btn-primary flex-1" onclick="saveMachineActivities('${machineId}')">💾 SIMPAN KEGIATAN</button><button class="btn btn-secondary flex-1" onclick="closeModal()">BATAL</button></div>`;
        
        showModal(html);
    }
    
    function saveMachineActivities(machineId) {
        const checkboxes = document.querySelectorAll('.act-checkbox');
        const newActivities = {};
        
        checkboxes.forEach(cb => {
            const kode = cb.getAttribute('data-kode');
            const nama = cb.getAttribute('data-nama');
            if (cb.checked) {
                if (!newActivities[kode]) newActivities[kode] = [];
                let durasi = null;
                const durationInput = document.querySelector(`.duration-input[data-nama="${nama}"][data-kode="${kode}"]`);
                if (durationInput && durationInput.value) {
                    durasi = parseInt(durationInput.value);
                }
                newActivities[kode].push({
                    nama: nama,
                    durasi: durasi && !isNaN(durasi) ? durasi : null
                });
            }
        });
        
        const index = allMachines.findIndex(m => m.id === machineId);
        if (index !== -1) {
            allMachines[index].activities = newActivities;
            saveToStorage();
            closeModal();
            renderApp();
            showToast('Kegiatan mesin berhasil diupdate');
        }
    }
    
    // ==================== INPUT TKL ACTIONS ====================
    function updateDateValue(val) { selectedDate = val; renderApp(); }
    function updateShiftValue(val) { selectedShift = val; renderApp(); }
    function updateMachineValue(val) { selectedMachineId = val; renderApp(); }
    function updateOperatorValue(val) { selectedOperator = toUpper(val); renderApp(); }
    
    function tambahBatch() { batches.push({ batch: '', good: 0, reject: 0 }); renderApp(); }
    function hapusBatch(i) { batches.splice(i, 1); renderApp(); }
    function updateBatch(i, field, val) { 
        if (field === 'batch') batches[i][field] = toUpper(val); 
        else batches[i][field] = val === '' ? 0 : parseInt(val); 
        renderApp(); 
    }
    function hapusKegiatan(i) { kegiatanList.splice(i, 1); renderApp(); }
    
    function resetForm() { 
        editMode = false; 
        editingRecordId = null; 
        kegiatanList = []; 
        batches = []; 
        selectedShift = ''; 
        selectedMachineId = ''; 
        selectedOperator = ''; 
        renderApp(); 
        showToast('Form direset');
    }
    
    function showTambahKegiatanModal() {
        if (!selectedMachineId) { 
            showToast('PILIH MESIN DULU', 'error'); 
            return; 
        }
        
        const mesin = allMachines.find(m => m.id === selectedMachineId);
        if (!mesin || !mesin.activities || Object.keys(mesin.activities).length === 0) {
            showToast('MESIN BELUM MEMILIKI KEGIATAN! Atur kegiatan di MANAGEMENT', 'error');
            return;
        }
        
        const start = getNextStart();
        const end = addHour(start);
        const shiftEnd = getShiftEnd();
        
        if (isTimeGreater(start, shiftEnd)) { 
            showToast('SHIFT SUDAH BERAKHIR', 'error'); 
            return; 
        }
        
        let options = '<option value="">PILIH KEGIATAN</option>';
        const kodeUrutan = ['1','2','3','5','6','7','8','9'];
        
        kodeUrutan.forEach(kode => {
            const acts = mesin.activities?.[kode] || [];
            if (acts.length) {
                options += `<optgroup label="KODE ${kode} ${KODE_TKL[kode]?.icon}">`;
                acts.forEach((a, idx) => {
                    const durasiText = a.durasi ? ` (Standar: ${a.durasi} min)` : '';
                    options += `<option value="${kode}_${idx}">${a.nama}${durasiText}</option>`;
                });
                options += '</optgroup>';
            }
        });
        
        showModal(`
            <h3 class="text-xl font-bold mb-4">➕ TAMBAH KEGIATAN</h3>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div><label>DARI</label><input type="time" id="modal-dari" class="input-field" value="${start}" ${!kegiatanList.length ? 'readonly' : ''}></div>
                <div><label>SAMPAI</label><input type="time" id="modal-sampai" class="input-field" value="${end}"></div>
            </div>
            <div class="mb-3"><label>KEGIATAN</label><select id="modal-kegiatan-select" class="input-field" onchange="updateKegiatanFromSelect()">${options}</select></div>
            <div class="mb-3"><label>NAMA KEGIATAN</label><input type="text" id="modal-kegiatan" class="input-field" readonly></div>
            <div class="flex gap-3"><button class="btn btn-primary flex-1" onclick="tambahKegiatanFromModal()">TAMBAH</button><button class="btn btn-secondary flex-1" onclick="closeModal()">BATAL</button></div>
        `);
    }
    
    function updateKegiatanFromSelect() {
        const sel = document.getElementById('modal-kegiatan-select');
        if (sel?.value) {
            const [kode, idx] = sel.value.split('_');
            const mesin = allMachines.find(m => m.id === selectedMachineId);
            const kegiatan = mesin?.activities?.[kode]?.[parseInt(idx)];
            if (kegiatan) {
                document.getElementById('modal-kegiatan').value = kegiatan.nama;
            }
        }
    }
    
    function tambahKegiatanFromModal() {
        const dari = document.getElementById('modal-dari')?.value;
        const sampai = document.getElementById('modal-sampai')?.value;
        const kegiatan = document.getElementById('modal-kegiatan')?.value;
        const sel = document.getElementById('modal-kegiatan-select');
        
        if (!sel?.value || !kegiatan) { 
            showToast('PILIH KEGIATAN', 'error'); 
            return; 
        }
        
        const [kode] = sel.value.split('_');
        
        if (isTimeGreater(sampai, getShiftEnd())) { 
            showToast('MELEBIHI AKHIR SHIFT', 'error'); 
            return; 
        }
        
        if (kegiatanList.length === 0) { 
            if (dari !== getShiftStart()) { 
                showToast(`KEGIATAN PERTAMA HARUS MULAI JAM ${getShiftStart()}`, 'error'); 
                return; 
            } 
        } else { 
            const last = kegiatanList[kegiatanList.length - 1]; 
            if (dari !== last.jam) { 
                showToast(`HARUS LANJUT DARI JAM ${last.jam}`, 'error'); 
                return; 
            } 
        }
        
        kegiatanList.push({ 
            dari, 
            jam: sampai, 
            kode: parseInt(kode), 
            kegiatan: toUpper(kegiatan) 
        });
        
        closeModal(); 
        renderApp(); 
        showToast('KEGIATAN DITAMBAHKAN');
    }
    
    function simpanData() {
        if (!selectedShift || !selectedMachineId || !selectedOperator) { 
            showToast('LENGKAPI DATA HEADER', 'error'); 
            return; 
        }
        if (!kegiatanList.length) { 
            showToast('MINIMAL 1 KEGIATAN', 'error'); 
            return; 
        }
        if (!batches.length) { 
            showToast('MINIMAL 1 BATCH', 'error'); 
            return; 
        }
        
        const oeeData = hitungAvailAndOEE(kegiatanList, batches, selectedShift, selectedMachineId);
        const resume = hitungResume(kegiatanList, selectedMachineId);
        const mesin = allMachines.find(m => m.id === selectedMachineId);
        
        const recordData = {
            date: selectedDate,
            shift: selectedShift,
            machine_id: selectedMachineId,
            machine_name: mesin?.machine_name,
            pic: toUpper(selectedOperator),
            batch_number: batches[0]?.batch || '',
            actual_output: batches.reduce((s,b)=>s+(b.good||0),0),
            reject: batches.reduce((s,b)=>s+(b.reject||0),0),
            availability_actual: oeeData.avail,
            availability_365: oeeData.avail365,
            performance: oeeData.perf,
            quality: oeeData.quality,
            oee_actual: oeeData.oee,
            oee_365: oeeData.oee365,
            minor_stop_count: 0,
            odt_data: kegiatanList.filter(k => [1,5,6,7,8].includes(k.kode)).map(k => {
                const mesinData = allMachines.find(m => m.id === selectedMachineId);
                let standar = 0;
                if (mesinData?.activities && mesinData.activities[k.kode]) {
                    const kegiatanData = mesinData.activities[k.kode].find(a => a.nama === k.kegiatan);
                    standar = kegiatanData?.durasi || 0;
                }
                const actual = hitungDurasi(k.dari, k.jam);
                return {
                    name: k.kegiatan,
                    standardTime: standar,
                    actualTime: actual,
                    checked: true
                };
            }),
            line_stop_mesin_data: kegiatanList.filter(k => k.kode === 3).map(k => ({
                item: k.kegiatan,
                duration: hitungDurasi(k.dari, k.jam),
                action: k.notes || '',
                wr: ''
            })),
            line_stop_non_mesin_data: [
                ...kegiatanList.filter(k => k.kode === 9).map(k => ({
                    item: k.kegiatan,
                    duration: hitungDurasi(k.dari, k.jam),
                    action: k.notes || ''
                })),
                ...resume.odtExceeds.map(ex => ({
                    item: `ODT Exceed - ${ex.item}`,
                    duration: ex.exceed,
                    action: 'Auto generated from ODT exceed'
                }))
            ],
            minor_stop_data: [],
            notes: '',
            kegiatan_data: kegiatanList,
            batch_data: batches
        };
        
        if (editMode && editingRecordId) updateOEERecord(editingRecordId, recordData);
        else saveOEERecord(recordData);
        
        kegiatanList = []; 
        batches = []; 
        selectedShift = ''; 
        selectedMachineId = ''; 
        selectedOperator = ''; 
        editMode = false; 
        editingRecordId = null;
        
        navigateTo('dashboard');
        showToast('Data berhasil disimpan!');
    }
    
    function editOEERecord(id) {
        const record = allOEERecords.find(r => r.id === id);
        if (!record) return;
        editMode = true;
        editingRecordId = id;
        selectedDate = record.date;
        selectedShift = record.shift;
        selectedMachineId = record.machine_id;
        selectedOperator = record.pic;
        kegiatanList = record.kegiatan_data || [];
        batches = record.batch_data || [];
        navigateTo('input');
        showToast('Data loaded for editing');
    }
    
    // ==================== MANAGEMENT ACTIONS ====================
    function unlockManagement() { 
        if (document.getElementById('mgmt-password')?.value === CONFIG.MANAGEMENT_PASSWORD) { 
            isManagementUnlocked = true; 
            renderApp(); 
            showToast('Management unlocked'); 
        } else showToast('Password salah', 'error'); 
    }
    
    function showTambahMesinModal() { 
        showModal(`<h3 class="text-xl font-bold mb-4">➕ TAMBAH MESIN BARU</h3>
            <div class="space-y-3">
                <div><label class="text-xs font-semibold">NAMA MESIN</label><input type="text" id="new-machine-name" class="input-field mt-1" placeholder="CONTOH: INJEKSI 1"></div>
                <div><label class="text-xs font-semibold">TARGET (PCS/MENIT)</label><input type="number" id="new-machine-target" class="input-field mt-1" placeholder="0" step="0.1"></div>
                <div><label class="text-xs font-semibold">PIC</label><input type="text" id="new-machine-pic" class="input-field mt-1" placeholder="NAMA PIC"></div>
                <div><label class="text-xs font-semibold">MINOR STOP ITEMS (pisah dengan koma)</label><input type="text" id="new-machine-ms" class="input-field mt-1" placeholder="ETIKET PUTUS, CODING KERING"></div>
                <div class="mt-4 p-3 bg-blue-50 rounded-lg"><p class="text-sm text-blue-700"><i class="fas fa-info-circle"></i> Setelah mesin dibuat, Anda dapat mengatur kegiatannya dengan klik tombol "Kegiatan".</p></div>
                <div class="flex gap-3 mt-4"><button class="btn btn-primary flex-1" onclick="saveNewMachine()">SIMPAN</button><button class="btn btn-secondary flex-1" onclick="closeModal()">BATAL</button></div>
            </div>
        `); 
    }
    
    function saveNewMachine() { 
        const name = document.getElementById('new-machine-name')?.value.toUpperCase(); 
        const target = parseFloat(document.getElementById('new-machine-target')?.value) || 0; 
        const pic = document.getElementById('new-machine-pic')?.value.toUpperCase() || ''; 
        const msStr = document.getElementById('new-machine-ms')?.value || ''; 
        const minorStop = msStr.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
        
        if (!name) { showToast('Nama mesin harus diisi', 'error'); return; } 
        allMachines.push({ 
            id: Date.now().toString(), 
            machine_name: name, 
            target_per_minute: target, 
            pic: pic, 
            minor_stop: minorStop,
            activities: {} 
        }); 
        saveToStorage(); 
        closeModal(); 
        renderApp(); 
        showToast('Mesin ditambahkan! Sekarang atur kegiatannya dengan klik tombol Kegiatan'); 
    }
    
    function editMachine(id) { 
        const m = allMachines.find(m => m.id === id); 
        if (!m) return; 
        showModal(`<h3 class="text-xl font-bold mb-4">✏️ EDIT MESIN</h3>
            <div class="space-y-3">
                <div><label class="text-xs font-semibold">NAMA MESIN</label><input type="text" id="edit-name" class="input-field mt-1" value="${m.machine_name}"></div>
                <div><label class="text-xs font-semibold">TARGET (PCS/MENIT)</label><input type="number" id="edit-target" class="input-field mt-1" step="0.1" value="${m.target_per_minute}"></div>
                <div><label class="text-xs font-semibold">PIC</label><input type="text" id="edit-pic" class="input-field mt-1" value="${m.pic || ''}"></div>
                <div><label class="text-xs font-semibold">MINOR STOP ITEMS (pisah dengan koma)</label><input type="text" id="edit-ms" class="input-field mt-1" value="${(m.minor_stop || []).join(', ')}"></div>
                <div class="flex gap-3 mt-4"><button class="btn btn-primary flex-1" onclick="updateMachine('${id}')">UPDATE</button><button class="btn btn-secondary flex-1" onclick="closeModal()">BATAL</button></div>
            </div>
        `); 
    }
    
    function updateMachine(id) { 
        const name = document.getElementById('edit-name')?.value.toUpperCase(); 
        const target = parseFloat(document.getElementById('edit-target')?.value) || 0; 
        const pic = document.getElementById('edit-pic')?.value.toUpperCase() || ''; 
        const msStr = document.getElementById('edit-ms')?.value || '';
        const minorStop = msStr.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
        
        const idx = allMachines.findIndex(m => m.id === id); 
        if (idx !== -1) { 
            allMachines[idx] = { ...allMachines[idx], machine_name: name, target_per_minute: target, pic: pic, minor_stop: minorStop }; 
            saveToStorage(); 
            closeModal(); 
            renderApp(); 
            showToast('Mesin diupdate'); 
        } 
    }
    
    function deleteMachine(id) { 
        if (confirm('Hapus mesin ini?')) { 
            allMachines = allMachines.filter(m => m.id !== id); 
            saveToStorage(); 
            renderApp(); 
            showToast('Mesin dihapus'); 
        } 
    }
    
    function addLibraryItem(kode) { 
        showModal(`<h3 class="text-xl font-bold mb-4">➕ TAMBAH KE LIBRARY KODE ${kode}</h3>
            <div><label class="text-xs font-semibold">NAMA KEGIATAN</label><input type="text" id="new-item" class="input-field mt-1" placeholder="CONTOH: SETUP INJEKSI"></div>
            <div class="flex gap-3 mt-4"><button class="btn btn-primary flex-1" onclick="saveLibraryItem('${kode}')">SIMPAN</button><button class="btn btn-secondary flex-1" onclick="closeModal()">BATAL</button></div>
        `); 
    }
    
    function saveLibraryItem(kode) { 
        const nama = document.getElementById('new-item')?.value.toUpperCase(); 
        if (!nama) { showToast('Nama kegiatan harus diisi', 'error'); return; } 
        if (!libraryKegiatan[kode]) libraryKegiatan[kode] = []; 
        libraryKegiatan[kode].push(nama); 
        saveToStorage(); 
        closeModal(); 
        renderApp(); 
        showToast('Kegiatan ditambahkan ke library'); 
    }
    
    function removeLibraryItem(kode, item) { 
        if (confirm(`Hapus "${item}" dari library?`)) { 
            libraryKegiatan[kode] = libraryKegiatan[kode].filter(i => i !== item); 
            saveToStorage(); 
            renderApp(); 
            showToast('Kegiatan dihapus dari library'); 
        } 
    }
    
    function searchOEERecords() {
        const date = document.getElementById('edit-search-date')?.value;
        const shift = document.getElementById('edit-search-shift')?.value;
        const machine = document.getElementById('edit-search-machine')?.value;
        let results = allOEERecords;
        if (date) results = results.filter(r => r.date === date);
        if (shift && shift !== '') results = results.filter(r => r.shift === shift);
        if (machine && machine !== '') results = results.filter(r => r.machine_name === machine);
        const container = document.getElementById('edit-search-results');
        if (!container) return;
        if (results.length === 0) { container.innerHTML = '<div class="text-center py-8 text-gray-400">Tidak ada data ditemukan</div>'; return; }
        container.innerHTML = `<div class="table-wrapper mt-4"> <table> <thead> <tr><th>Tanggal</th><th>Shift</th><th>Mesin</th><th>PIC</th><th>Output</th><th>OEE%</th><th>Aksi</th> </thead> <tbody>${results.map(r => `<tr>
                <td>${formatDateShort(r.date)}</td>
                <td>${r.shift}</td>
                <td>${r.machine_name}</td>
                <td>${r.pic}</td>
                <td>${r.actual_output}</td>
                <td class="${(r.oee_actual || 0) >= 88 ? 'status-good' : 'status-bad'}">${(r.oee_actual || 0).toFixed(1)}%</td>
                <td><button class="btn btn-primary text-xs py-1 px-3" onclick="editOEERecord('${r.id}')">Edit</button></td>
            </tr>`).join('')} </tbody> </div>`;
    }
    
    // ==================== NAVIGATION ====================
    function navigateTo(page) {
        currentPage = page;
        if (page !== 'management') isManagementUnlocked = false;
        renderApp();
    }
    
    function updateFilter(key, value) {
        filters[key] = value;
        renderApp();
    }
    
    // ==================== RENDER APP ====================
    function renderApp() {
        const app = document.getElementById('app-wrapper');
        if (!app) return;
        
        if (currentPage === 'dashboard') {
            app.innerHTML = renderDashboard();
            setTimeout(renderCharts, 100);
        } else if (currentPage === 'input') {
            app.innerHTML = renderInputPage();
        } else if (currentPage === 'management') {
            app.innerHTML = isManagementUnlocked ? renderManagementPage() : renderManagementLogin();
        } else if (currentPage === 'audit') {
            app.innerHTML = renderAuditPage();
        }
    }
    
    // ==================== EXPORT GLOBAL ====================
    window.navigateTo = navigateTo;
    window.updateFilter = updateFilter;
    window.closeModal = closeModal;
    window.showRecordDetail = showRecordDetail;
    window.updateDateValue = updateDateValue;
    window.updateShiftValue = updateShiftValue;
    window.updateMachineValue = updateMachineValue;
    window.updateOperatorValue = updateOperatorValue;
    window.tambahBatch = tambahBatch;
    window.hapusBatch = hapusBatch;
    window.updateBatch = updateBatch;
    window.hapusKegiatan = hapusKegiatan;
    window.resetForm = resetForm;
    window.showTambahKegiatanModal = showTambahKegiatanModal;
    window.updateKegiatanFromSelect = updateKegiatanFromSelect;
    window.tambahKegiatanFromModal = tambahKegiatanFromModal;
    window.simpanData = simpanData;
    window.editOEERecord = editOEERecord;
    window.unlockManagement = unlockManagement;
    window.showTambahMesinModal = showTambahMesinModal;
    window.saveNewMachine = saveNewMachine;
    window.editMachine = editMachine;
    window.updateMachine = updateMachine;
    window.deleteMachine = deleteMachine;
    window.addLibraryItem = addLibraryItem;
    window.saveLibraryItem = saveLibraryItem;
    window.removeLibraryItem = removeLibraryItem;
    window.searchOEERecords = searchOEERecords;
    window.editMachineActivities = editMachineActivities;
    window.saveMachineActivities = saveMachineActivities;
    
    // ==================== INIT ====================
    loadFromStorage();
    renderApp();
})();
</script>
</body>
</html>
